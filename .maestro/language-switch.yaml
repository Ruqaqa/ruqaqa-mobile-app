appId: sa.ruqaqa.finance
---
# Test language switching between English and Arabic
- launchApp
- tapOn:
    id: "dev-skip-update"
    optional: true
- extendedWaitUntil:
    visible: "Ruqaqa App"
    timeout: 15000

# Verify English content
- assertVisible: "Sign in with Microsoft"

# Switch to other language
- tapOn:
    id: "language-switcher"

# Wait for language change
- extendedWaitUntil:
    visible: "تسجيل الدخول بـ Microsoft"
    timeout: 5000

# Switch back
- tapOn:
    id: "language-switcher"
- extendedWaitUntil:
    visible: "Sign in with Microsoft"
    timeout: 5000
