appId: sa.ruqaqa.finance
env:
  TEST_USERNAME: ${TEST_USERNAME}
  TEST_PASSWORD: ${TEST_PASSWORD}
---
- launchApp

# Wait for app to load
- extendedWaitUntil:
    visible: "Sign in with SSO|Update now"
    timeout: 10000

# Version gate → skip if present
- tapOn:
    id: "dev-skip-update"
    optional: true

# Hit Keycloak SSO
- tapOn:
    id: "sso-keycloak-button"

# Keycloak login form — may not appear if browser has active session
- extendedWaitUntil:
    visible: "Username or email|Operations|Reconciliation|Payroll"
    timeout: 10000

# Fill credentials only if Keycloak form appeared
- runFlow:
    when:
      visible: "Username or email"
    commands:
      - tapOn: "Username or email"
      - inputText: "${TEST_USERNAME}"
      - tapOn: "Password"
      - inputText: "${TEST_PASSWORD}"
      - pressKey: back
      - scrollUntilVisible:
          element: "Sign In"
          direction: DOWN
      - tapOn: "Sign In"

# Should land in authenticated shell
- extendedWaitUntil:
    visible: "Operations|Reconciliation|Payroll"
    timeout: 10000
