appId: sa.ruqaqa.finance
---
# Verify all login screen elements are present
- launchApp
- extendedWaitUntil:
    visible: "Sign in with SSO|Update now"
    timeout: 10000
- tapOn:
    id: "dev-skip-update"
    optional: true

# Verify branding
- assertVisible: "Ruqaqa Limited Company App"

# Verify SSO buttons
- assertVisible: "Sign in with Microsoft"
- assertVisible: "Sign in with SSO"

# Verify security note
- assertVisible: "Login is secure and protected.*"
