appId: sa.ruqaqa.app
---
# Verify app launches and loads correctly
- launchApp
- extendedWaitUntil:
    visible: "Sign in with SSO|Update now"
    timeout: 10000
# Skip version gate if present
- tapOn:
    id: "dev-skip-update"
    optional: true
- assertVisible: "Sign in with Microsoft"
- assertVisible: "Sign in with SSO"
