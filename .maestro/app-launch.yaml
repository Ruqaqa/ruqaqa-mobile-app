appId: sa.ruqaqa.finance
---
# Verify app launches and loads correctly
- launchApp
- extendedWaitUntil:
    visible: "Update now"
    timeout: 60000
# Skip version gate in dev
- tapOn:
    id: "dev-skip-update"
# Should now see the login screen
- extendedWaitUntil:
    visible: "Ruqaqa App"
    timeout: 10000
- assertVisible: "Sign in with Microsoft"
- assertVisible: "Sign in with Keycloak"
